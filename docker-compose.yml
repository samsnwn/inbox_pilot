services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inbox_pilot
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    env_file: .env
    environment:
      - PYTHONPATH=/code
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - .:/code

  worker:
    build: .
    env_file: .env
    environment:
      - PYTHONPATH=/code
    command: python -m app.workers.worker
    depends_on:
      - db
      - redis
    volumes:
      - .:/code