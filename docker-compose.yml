services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inbox_pilot
    ports:
      - "5432:5432"

  api:
    build: .
    env_file: .env
    environment:
      - PYTHONPATH=/code
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - .:/code